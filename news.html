<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Новости | ООО "Волга-Днепр Инжиниринг"</title>
  <meta name="description" content="Актуальные новости и события компании Волга-Днепр Инжиниринг. Достижения в области модификации авиационной техники.">
  <link rel="icon" type="image/png" href="assets/images/tab.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  
  <script src="js/config.js"></script>
  <script src="js/services.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/ui/ModalManager.js"></script>
  <script src="js/ui/NavigationManager.js"></script>
  <script src="js/ui/AnimationManager.js"></script>
  <script src="js/ui/FormManager.js"></script>
  <script src="js/ui/MapManager.js"></script>
  <script src="js/ui/NewsRenderer.js"></script>
  <script src="js/ui/NewsManager.js"></script>
  <script src="js/data/newsData.js"></script>
  <script src="js/app.js"></script>
</head>
<body>

<div id="appError" style="display: none;"></div>
<!-- Навигация и мобильное меню загружаются через ComponentLoader -->

<!-- page-header: убран градиент -->
<section class="page-header" style="background: var(--vd-light-blue); padding: 120px 5% 60px; text-align: center; color: #004E96;">
  <h1 style="font-size: 2.5rem; margin-bottom: 1rem;">Новости и события</h1>
  <p style="font-size: 1.1rem; max-width: 800px; margin: 0 auto;">Следите за последними достижениями и новостями компании</p>
</section>

<section class="news-full" style="padding: 60px 5%;">
  <div class="news-tabs" id="newsTabs" style="display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; margin-bottom: 2rem;">
    <button class="news-tab active" data-year="2026">2026</button>
    <button class="news-tab" data-year="2025">2025</button>
    <button class="news-tab" data-year="2024">2024</button>
    <button class="news-tab" data-year="2023">2023</button>
    <button class="news-tab" data-year="2022">2022</button>
  </div>

  <div class="news-tab-content active" id="tab-2026">
    <div class="year-divider"><div class="year-divider-line"></div><div class="year-divider-content"><span class="year-divider-year">2026</span><span class="year-divider-label">Год подтверждения соответствия и расширения</span></div><div class="year-divider-line"></div></div>
    <div class="news-grid" id="newsGrid-2026" style="max-width: 1400px; margin: 0 auto;"></div>
  </div>

  <div class="news-tab-content" id="tab-2025">
    <div class="year-divider"><div class="year-divider-line"></div><div class="year-divider-content"><span class="year-divider-year">2025</span><span class="year-divider-label">Год инноваций</span></div><div class="year-divider-line"></div></div>
    <div class="news-grid" id="newsGrid-2025" style="max-width: 1400px; margin: 0 auto;"></div>
  </div>

  <div class="news-tab-content" id="tab-2024">
    <div class="year-divider"><div class="year-divider-line"></div><div class="year-divider-content"><span class="year-divider-year">2024</span><span class="year-divider-label">Год успехов</span></div><div class="year-divider-line"></div></div>
    <div class="news-grid" id="newsGrid-2024" style="max-width: 1400px; margin: 0 auto;"></div>
  </div>

  <div class="news-tab-content" id="tab-2023">
    <div class="year-divider"><div class="year-divider-line"></div><div class="year-divider-content"><span class="year-divider-year">2023</span><span class="year-divider-label">Год расширения</span></div><div class="year-divider-line"></div></div>
    <div class="news-grid" id="newsGrid-2023" style="max-width: 1400px; margin: 0 auto;"></div>
  </div>

  <div class="news-tab-content" id="tab-2022">
    <div class="year-divider"><div class="year-divider-line"></div><div class="year-divider-content"><span class="year-divider-year">2022</span><span class="year-divider-label">Год сертификации</span></div><div class="year-divider-line"></div></div>
    <div class="news-grid" id="newsGrid-2022" style="max-width: 1400px; margin: 0 auto;"></div>
  </div>
</section>

<!-- Футер и модальное окно загружаются через ComponentLoader -->
<button class="scroll-to-top" id="scrollToTop" onclick="window.scrollToTop && window.scrollToTop()" aria-label="Наверх"><svg viewBox="0 0 24 24"><path d="M12 8l-6 6 1.41 1.41L12 10.83l4.59 4.58L18 14z"/></svg></button>

<!-- News Modal (уникальный для страницы новостей) -->
<div class="news-modal-overlay" id="newsModalOverlay" role="dialog" aria-modal="true" aria-labelledby="newsModalTitle">
  <div class="news-modal-container">
    <button class="news-modal-close" onclick="window.closeNewsModal && window.closeNewsModal()" aria-label="Закрыть"><svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg></button>
    <img class="news-modal-image" id="newsModalImage" src="" alt="" loading="lazy">
    <div class="news-modal-body">
      <span class="news-modal-category" id="newsModalCategory"></span>
      <div class="news-modal-date" id="newsModalDate"></div>
      <h2 class="news-modal-title" id="newsModalTitle"></h2>
      <div class="news-modal-content" id="newsModalContent"></div>
    </div>
  </div>
</div>
<button class="floating-cta-btn" onclick="window.openModal && window.openModal()" aria-label="Запросить КП"><svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg><span>Запросить КП</span></button>
</body>
</html>
