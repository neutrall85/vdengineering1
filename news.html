<body>

<!-- Статический фолбэк без JS (требование безопасности) -->
<noscript>
  <div class="user-notice-fallback">
    <p>Для улучшения работы сайта используются технологии хранения данных. <a href="#privacy-policy">Политика конфиденциальности</a></p>
  </div>
</noscript>

<!-- Лоадер страницы - показывается до полной загрузки компонентов -->
<div id="pageLoader" class="page-loader">
  <div class="loader-content">
    <div class="orbit-container">
      <div class="orbit-ring"></div>
      <div class="plane-wrapper">
        <div class="plane-icon">
          <svg viewBox="0 0 24 24" fill="white">
            <path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/>
          </svg>
        </div>
      </div>
    </div>
    <p class="loader-text">Загрузка...</p>
  </div>
</div>

<div id="appError" class="hidden-display"></div>
<nav class="navbar" id="navbar"></nav>
<div class="mobile-menu-overlay" id="mobileMenuOverlay"></div>
<section class="page-header page-header-bg">
  <h1 class="page-header-title">Новости и события</h1>
  <p class="page-header-desc">Следите за последними достижениями и новостями компании</p>
</section>

<section class="news-full section-padding-lg">
  <div class="news-tabs flex-gap-wrap" id="newsTabs">
    <button class="news-tab active" data-year="2026">2026</button>
    <button class="news-tab" data-year="2025">2025</button>
    <button class="news-tab" data-year="2024">2024</button>
    <button class="news-tab" data-year="2023">2023</button>
    <button class="news-tab" data-year="2022">2022</button>
  </div>

  <div class="news-tab-content active" id="tab-2026">
    <div class="year-divider"><div class="year-divider-line"></div><div class="year-divider-content"><span class="year-divider-year">2026</span><span class="year-divider-label">Год подтверждения соответствия и расширения</span></div><div class="year-divider-line"></div></div>
    <div class="news-grid news-grid-auto" id="newsGrid-2026"></div>
  </div>

  <div class="news-tab-content" id="tab-2025">
    <div class="year-divider"><div class="year-divider-line"></div><div class="year-divider-content"><span class="year-divider-year">2025</span><span class="year-divider-label">Год инноваций</span></div><div class="year-divider-line"></div></div>
    <div class="news-grid news-grid-auto" id="newsGrid-2025"></div>
  </div>

  <div class="news-tab-content" id="tab-2024">
    <div class="year-divider"><div class="year-divider-line"></div><div class="year-divider-content"><span class="year-divider-year">2024</span><span class="year-divider-label">Год успехов</span></div><div class="year-divider-line"></div></div>
    <div class="news-grid news-grid-auto" id="newsGrid-2024"></div>
  </div>

  <div class="news-tab-content" id="tab-2023">
    <div class="year-divider"><div class="year-divider-line"></div><div class="year-divider-content"><span class="year-divider-year">2023</span><span class="year-divider-label">Год расширения</span></div><div class="year-divider-line"></div></div>
    <div class="news-grid news-grid-auto" id="newsGrid-2023"></div>
  </div>

  <div class="news-tab-content" id="tab-2022">
    <div class="year-divider"><div class="year-divider-line"></div><div class="year-divider-content"><span class="year-divider-year">2022</span><span class="year-divider-label">Год сертификации</span></div><div class="year-divider-line"></div></div>
    <div class="news-grid news-grid-auto" id="newsGrid-2022"></div>
  </div>
</section>

<!-- Футер и модальное окно загружаются через ComponentLoader -->
<button class="scroll-to-top" id="scrollToTop" aria-label="Наверх"><svg viewBox="0 0 24 24"><path d="M12 8l-6 6 1.41 1.41L12 10.83l4.59 4.58L18 14z"/></svg></button>

<!-- News Modal (уникальный для страницы новостей) -->
<div class="modal-overlay" id="newsModalOverlay" role="dialog" aria-modal="true" aria-labelledby="newsModalTitle">
  <div class="modal-container">
    <button class="modal-close" id="newsModalCloseBtn" aria-label="Закрыть"><svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg></button>
    <img class="modal-image" id="newsModalImage" src="" alt="" loading="lazy">
    <div class="modal-body">
      <span class="modal-category" id="newsModalCategory"></span>
      <div class="modal-date" id="newsModalDate"></div>
      <h2 class="modal-title" id="newsModalTitle"></h2>
      <div class="modal-content" id="newsModalContent"></div>
    </div>
  </div>
</div>

<!-- Лайтбокс для полноэкранного просмотра изображений -->
<div class="lightbox-overlay" id="lightboxOverlay" role="dialog" aria-modal="true" aria-label="Просмотр изображения">
  <div class="lightbox-content">
    <button class="lightbox-close" id="lightboxCloseBtn" aria-label="Закрыть"><svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg></button>
    <img class="lightbox-image" id="lightboxImage" src="" alt="">
  </div>
</div>
<button class="floating-cta-btn btn-primary" id="floatingCtaBtn" aria-label="Запросить КП"><svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg><span>Запросить КП</span></button>
